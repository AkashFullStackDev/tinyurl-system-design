version: '3.8'

services:

  redis:
    image: redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
    - redis_data:/data
    restart: always

  cassandra1:
    image: cassandra:4.1
    environment:
      - CASSANDRA_CLUSTER_NAME=tinyurl-clusters
      - CASSANDRA_SEEDS=cassandra1
      - CASSANDRA_BROADCAST_ADDRESS=cassandra1
      - CASSANDRA_NUM_TOKENS=16
      - MAX_HEAP_SIZE=256M
      - HEAP_NEWSIZE=64M
    volumes:
      - cassandra_data1:/var/lib/cassandra
    restart: always

  cassandra2:
    image: cassandra:4.1
    environment:
      - CASSANDRA_CLUSTER_NAME=tinyurl-clusters
      - CASSANDRA_SEEDS=cassandra1
      - CASSANDRA_BROADCAST_ADDRESS=cassandra2
      - CASSANDRA_NUM_TOKENS=16
      - MAX_HEAP_SIZE=256M
      - HEAP_NEWSIZE=64M
    depends_on:
      - cassandra1
    command: >
      bash -c "sleep 90 && /usr/local/bin/docker-entrypoint.sh cassandra -f"
    volumes:
      - cassandra_data2:/var/lib/cassandra
    restart: always

  cassandra3:
    image: cassandra:4.1
    environment:
      - CASSANDRA_CLUSTER_NAME=tinyurl-clusters
      - CASSANDRA_SEEDS=cassandra1
      - CASSANDRA_BROADCAST_ADDRESS=cassandra3
      - CASSANDRA_NUM_TOKENS=16
      - MAX_HEAP_SIZE=256M
      - HEAP_NEWSIZE=64M
    depends_on:
      - cassandra1
    command: >
      bash -c "sleep 180 && /usr/local/bin/docker-entrypoint.sh cassandra -f"
    volumes:
      - cassandra_data3:/var/lib/cassandra
    restart: always

  app:
    build: .
    depends_on:
      - redis
      - cassandra1
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - SERVER_ID=${SERVER_ID}
    restart: always

  nginx:
    image: nginx
    ports:
      - "8081:80"
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf

volumes:
  cassandra_data1:
  cassandra_data2:
  cassandra_data3:
  redis_data: